    - number: 52
      question: "Range of f: x → x³ for domain {-2,-1,0,1,2} is"
      options:
        A: "{8,1,0,1,8}"
        B: "{6,3,0,3,6}"
        C: "{-6,-3,0,3,6}"
        D: "{-8,-1,0,1,8}"
