    - number: 58
      question: "Scale factor of enlargement with centre O mapping ΔABC to ΔA'B'C'"
      options:
        A: "-2"
        B: "-1"
        C: "1"
        D: "2"
      correct_answer: "A"

    - number: 59
      question: "Angle of depression = 30°, F is 25 m from E. Distance FG in metres is"
      options:
        A: "25/tan30°"
        B: "25/tan60°"
        C: "25 cos30°"
        D: "25 sin30°"
      correct_answer: "A"

    - number: 60
      question: "Estimate of building height (surveyor 12 m from foot, angle of elevation 40°, instrument height 1.6 m) is"
      options:
        A: "1.6 + 12 tan40°"
        B: "1.6 + 12 cos40°"
        C: "(12 tan40°) - 1.6"
        D: "(12 sin40°) - 1.6"
      correct_answer: "A"