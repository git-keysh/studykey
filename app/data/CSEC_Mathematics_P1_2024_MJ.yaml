    - number: 55
      question: "In the isosceles triangle, the value of x is"
      options:
        A: "30°"
        B: "60°"
        C: "120°"
        D: "150°"
      correct_answer: "C"

    - number: 56
      question: "The length of MO (similar triangles) in cm is"
      options:
        A: "2.5"
        B: "3.0"
        C: "3.5"
        D: "7.0"
      correct_answer: "B"

    - number: 57
      question: "The translation mapping AB onto A'B' is represented by"
      options:
        A: "[2,1]"
        B: "[1,1]"
        C: "[3,2]"
        D: "[5,3]"
