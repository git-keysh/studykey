exam:
  title: "CSEC Mathematics P1 2017 MJ"
  year: 2017
  subject: "Mathematics"
  total_items: 60
  items:
    - number: 1
      question: "(-3)^2 + (-2)^2 is equal to"
      options:
        A: "-13"
        B: "-10"
        C: "13"
        D: "25"
      correct_answer: "C"

    - number: 2
      question: "What number when added to 1⅓ gives 2?"
      options:
        A: "1/3"
        B: "2/3"
        C: "1"
        D: "3"
      correct_answer: "B"

    - number: 3
      question: "Ann and Betty shared a sum of money in the ratio 2:3. If Ann received $60 less than Betty, what was the total amount shared?"
      options:
        A: "$72"
        B: "$80"
        C: "$180"
        D: "$300"
      correct_answer: "D"

    - number: 4
      question: "If 235 × 48.7 = 11,444.5, then 23.5 × 0.487 ="
      options:
        A: "11.4445"
        B: "114.445"
        C: "1,144.45"
        D: "11,444.4"
      correct_answer: "A"

    - number: 5
      question: "A test was marked out of 80. A boy scored 60% of the marks. How many marks did he score?"
      options:
        A: "20"
        B: "48"
        C: "60"
        D: "75"
      correct_answer: "B"

    - number: 6
      question: "If 30% of a number is 45, what is 4/5 of the number?"
      options:
        A: "36"
        B: "120"
        C: "150"
        D: "180"
      correct_answer: "B"

    - number: 7
      question: "What is the value of the digit 2 in the number 48.621?"
      options:
        A: "2/100"
        B: "2/10"
        C: "2"
        D: "200"
      correct_answer: "A"

    - number: 8
      question: "The highest common factor (HCF) of 12, 15 and 60 is"
      options:
        A: "1"
        B: "3"
        C: "12"
        D: "60"
      correct_answer: "B"

    - number: 9
      question: "The next term in the sequence 1,6,13,22,33 is"
      options:
        A: "44"
        B: "45"
        C: "46"
        D: "52"
      correct_answer: "C"

    - number: 10
      question: "By the distributive law, 49 × 17 + 49 × 3 ="
      options:
        A: "52 + 66"
        B: "52 × 66"
        C: "49 + 20"
        D: "49 × 20"
      correct_answer: "D"

    - number: 11
      question: "If P = {2,3,5,7}, Q = {2,3,6} and S = {2,4,5}, then P ∩ Q ∩ S ="
      options:
        A: "{2}"
        B: "{2,3}"
        C: "{2,3,5}"
        D: "{2,3,4,5,6,7}"
      correct_answer: "A"

    - number: 12
      question: "In the Venn diagram, the shaded area represents"
      options:
        A: "P'"
        B: "(P ∪ Q)'"
        C: "Q ∪ P'"
        D: "Q ∩ P'"
      correct_answer: "D"

    - number: 13
      question: "In a class of 32 students, 17 study Music and 20 study Art. What is the LEAST number who study BOTH?"
      options:
        A: "3"
        B: "5"
        C: "12"
        D: "15"
      correct_answer: "B"

    - number: 14
      question: "If P = {Factors of 6} and Q = {Factors of 4}, then the shaded region represents"
      options:
        A: "{}"
        B: "{1,2}"
        C: "{4,6,8...}"
        D: "{12,24,36...}"
      correct_answer: "B"

    - number: 15
      question: "A dress costing $180 is sold at a 10% discount. The amount of the discount is"
      options:
        A: "$1.80"
        B: "$10.00"
        C: "$18.00"
        D: "$170.00"
      correct_answer: "C"

    - number: 16
      question: "Land valued at $18,000. Tax at $0.70 per $100 value. Total tax paid?"
      options:
        A: "$110.00"
        B: "$126.00"
        C: "$180.70"
        D: "$257.15"
      correct_answer: "B"

    - number: 17
      question: "At year end, a car is worth 5% less than at the beginning. If worth $9,500 in Dec 2016, value in Jan 2016 was"
      options:
        A: "$9,995"
        B: "$10,000"
        C: "$10,025"
        D: "$12,000"
      correct_answer: "B"

    - number: 18
      question: "A man bought a mobile phone for $800 and sold it for $1,000. Profit as percentage of cost price?"
      options:
        A: "5%"
        B: "15%"
        C: "20%"
        D: "25%"
      correct_answer: "D"

    - number: 19
      question: "Man's annual salary $45,000. Tax-free allowances $13,000. Pays tax of 35% on taxable income. Tax payable?"
      options:
        A: "$4,550"
        B: "$11,200"
        C: "$15,750"
        D: "$20,300"
      correct_answer: "B"

    - number: 20
      question: "Simple interest on a loan of $6,000 for 3 years was $900. Rate of interest per annum?"
      options:
        A: "2%"
        B: "3%"
        C: "5%"
        D: "18%"
      correct_answer: "C"

    - number: 21
      question: "TV cash price $350. Hire purchase: $35 deposit + 12 × $30. How much saved by paying cash?"
      options:
        A: "$10"
        B: "$25"
        C: "$40"
        D: "$45"
      correct_answer: "D"

    - number: 22
      question: "How much does a customer pay for an article marked $50 if sales tax of 6% is charged?"
      options:
        A: "$44"
        B: "$47"
        C: "$53"
        D: "$56"
      correct_answer: "C"

    - number: 23
      question: "Seven times the product of two numbers a and b may be written as"
      options:
        A: "7ab"
        B: "49ab"
        C: "7a + b"
        D: "7(a + b)"
      correct_answer: "A"

    - number: 24
      question: "If x is an integer satisfying 4 < 2x ≤ 6, then"
      options:
        A: "2 < x ≤ 3"
        B: "-2 < x ≤ 3"
        C: "-3 < x ≤ 2"
        D: "-3 ≤ x < -2"
      correct_answer: "A"

    - number: 25
      question: "The coefficient of x in the expansion of (x + 3)(x - 1) is"
      options:
        A: "-3"
        B: "-2"
        C: "2"
        D: "4"
      correct_answer: "C"

    - number: 26
      question: "3x² × 2x³ ="
      options:
        A: "6x"
        B: "6x⁵"
        C: "6x⁶"
        D: "72x⁵"
      correct_answer: "B"

    - number: 27
      question: "P = m³/(2 - m). When m = -2, the value of P is"
      options:
        A: "-2"
        B: "-6/4"
        C: "6/4"
        D: "2"
      correct_answer: "A"

    - number: 28
      question: "If a * b = a/b - 1, then 7 * 28 ="
      options:
        A: "-3/4"
        B: "1/4"
        C: "3"
        D: "4"
      correct_answer: "A"

    - number: 29
      question: "If 5(2x - 1) = 35, then x ="
      options:
        A: "-4"
        B: "1/4"
        C: "3"
        D: "4"
      correct_answer: "D"

    - number: 30
      question: "John has x marbles and Max has twice as many. Max gives John 5 marbles. How many does John now have?"
      options:
        A: "x + 5"
        B: "x - 5"
        C: "2x - 5"
        D: "2x + 5"
      correct_answer: "A"

    - number: 31
      question: "When 8 is subtracted from a number and the result multiplied by 3, the answer is 21. What is the original number?"
      options:
        A: "1"
        B: "3"
        C: "10"
        D: "15"
      correct_answer: "D"

    - number: 32
      question: "How many kilograms are there in one tonne?"
      options:
        A: "10"
        B: "100"
        C: "1000"
        D: "10,000"
      correct_answer: "C"

    - number: 33
      question: "The volume in cm³ of a cube of edge 3 cm is"
      options:
        A: "9"
        B: "18"
        C: "27"
        D: "54"
      correct_answer: "C"

    - number: 34
      question: "A car travels 80 kilometres in 2½ hours. Speed in km/h?"
      options:
        A: "6"
        B: "32"
        C: "82.5"
        D: "200"
      correct_answer: "B"

    - number: 35
      question: "Square side = 5 cm, triangle height = 4 cm. TOTAL area of the figure in cm²?"
      options:
        A: "35"
        B: "45"
        C: "50"
        D: "100"
      correct_answer: "A"

    - number: 36
      question: "Area of rectangle = 53.6 cm². Length ×4, width halved. New area?"
      options:
        A: "26.8 cm²"
        B: "53.6 cm²"
        C: "107.2 cm²"
        D: "214.4 cm²"
      correct_answer: "C"

    - number: 37
      question: "Man leaves home at 22:15, reaches destination at 04:00 next day (same time zone). How many hours did the journey take?"
      options:
        A: "4 hours 45 minutes"
        B: "5 hours 45 minutes"
        C: "6 hours 15 minutes"
        D: "7 hours 45 minutes"
      correct_answer: "B"

    - number: 38
      question: "Distance around lake = 8 km. On map, represented by 2 cm. Scale?"
      options:
        A: "1:40"
        B: "1:2,000"
        C: "1:200,000"
        D: "1:400,000"
      correct_answer: "D"

    - number: 39
      question: "Perimeter of a square = 56 cm. Area in cm²?"
      options:
        A: "28"
        B: "78"
        C: "169"
        D: "196"
      correct_answer: "D"

    - number: 40
      question: "Cylinder radius = 3 cm, height = 8 cm. Volume in terms of π?"
      options:
        A: "12π cm³"
        B: "48π cm³"
        C: "72π cm³"
        D: "192π cm³"
      correct_answer: "C"

    - number: 41
      question: "What was the modal age?"
      options:
        A: "5"
        B: "6"
        C: "7"
        D: "8"
      correct_answer: "B"

    - number: 42
      question: "How many children took part in the survey?"
      options:
        A: "5"
        B: "15"
        C: "75"
        D: "87"
      correct_answer: "D"

    - number: 43
      question: "The range of the scores is"
      options:
        A: "2"
        B: "7"
        C: "8"
        D: "10"
      correct_answer: "C"

    - number: 44
      question: "If the mean of 4, 8, 2x and 12 is 10, then x ="
      options:
        A: "8"
        B: "10"
        C: "12"
        D: "16"
      correct_answer: "A"

    - number: 45
      question: "Of 120 students, 100 are expected to pass. Probability a randomly selected student will FAIL?"
      options:
        A: "1/6"
        B: "1/5"
        C: "1/2"
        D: "5/6"
      correct_answer: "A"

    - number: 46
      question: "Which diagram BEST illustrates a function?"
      options:
        A: "Diagram A"
        B: "Diagram B"
        C: "Diagram C"
        D: "Diagram D"
      correct_answer: "A"

    - number: 47
      question: "The straight line AB cuts the y-axis at"
      options:
        A: "(0,3)"
        B: "(0,2)"
        C: "(3,-2)"
        D: "(0,-2)"
      correct_answer: "D"

    - number: 48
      question: "If h(x) = (3x - 2)/5, then h(-6) ="
      options:
        A: "-4"
        B: "-16/5"
        C: "16/5"
        D: "4"
      correct_answer: "A"

    - number: 49
      question: "The inequality on the number line is defined by"
      options:
        A: "-2 ≤ x < 3"
        B: "-2 < x ≤ 3"
        C: "-2 ≤ x ≤ 3"
        D: "-2 < x < 3"
      correct_answer: "B"

    - number: 50
      question: "The values of x where y = 4x - x² intersects y = 0 are"
      options:
        A: "x = 0 and x = 4"
        B: "x = 0 and x = 2"
        C: "x = 0 and x = -4"
        D: "x = 2 and x = 4"
      correct_answer: "A"

    - number: 51
      question: "Which BEST describes the function?"
      options:
        A: "f(x) = x"
        B: "x = f(x) + 3"
        C: "f(x) = y + 3"
        D: "f(x) = x + 3"
      correct_answer: "D"

    - number: 52
      question: "If each exterior angle of a regular polygon is 60°, then the polygon is a"
      options:
        A: "quadrilateral"
        B: "pentagon"
        C: "hexagon"
        D: "triangle"
      correct_answer: "C"

    - number: 53
      question: "The measure of angle ABE is"
      options:
        A: "58°"
        B: "122°"
        C: "142°"
        D: "302°"
      correct_answer: "B"

    - number: 54
      question: "In the isosceles triangle, the value of x is"
      options:
        A: "30°"
        B: "60°"
        C: "120°"
        D: "150°"
      correct_answer: "C"

    - number: 55
      question: "What is the image of the line y = x when rotated anticlockwise about O through 90°?"
      options:
        A: "y = 0"
        B: "x = 0"
        C: "y = x"
        D: "y = -x"
      correct_answer: "D"

    - number: 56
      question: "The length of MO in centimetres is"
      options:
        A: "2.5"
        B: "3.0"
        C: "3.5"
        D: "7.0"
      correct_answer: "B"

    - number: 57
      question: "In triangle ABC, angle BAC = 30°, AB = 40 m. Length BC in metres is"
      options:
        A: "40 sin30°"
        B: "40 tan30°"
        C: "40 sin60°"
        D: "40 tan60°"
      correct_answer: "A"

    - number: 58
      question: "In triangle ABC, AB = 17 cm, AC = 15 cm, BC = x cm. The value of x is"
      options:
        A: "7"
        B: "8"
        C: "9"
        D: "12"
      correct_answer: "B"

    - number: 59
      question: "In triangle PQR, angle P = x°, angle Q = 2x°. Size of angle R?"
      options:
        A: "60°"
        B: "45°"
        C: "(180°/3x)°"
        D: "(180° - 3x°)"
      correct_answer: "D"

    - number: 60
      question: "An estimate of the height of the building is obtained by calculating"
      options:
        A: "12 tan40°"
        B: "12 sin40°"
        C: "1.6 + 12 cos40°"
        D: "1.6 + 12 tan40°"
      correct_answer: "D"