exam:
  title: "CSEC Mathematics P1 2020 JAN"
  year: 2020
  subject: "Mathematics"
  total_items: 60
  items:
    - number: 1
      question: "What percentage of 40 is 8?"
      options:
        A: "5"
        B: "20"
        C: "32"
        D: "150"
      correct_answer: "B"

    - number: 2
      question: "(2/3)² is equal to"
      options:
        A: "4/9"
        B: "4/6"
        C: "6/4"
        D: "9/4"
      correct_answer: "A"

    - number: 3
      question: "√(17² - 15²) ="
      options:
        A: "1"
        B: "2"
        C: "8"
        D: "16"
      correct_answer: "C"

    - number: 4
      question: "The square root of 191 lies between"
      options:
        A: "11 and 13"
        B: "12 and 13"
        C: "13 and 14"
        D: "45 and 46"
      correct_answer: "C"

    - number: 5
      question: "99 × 101 has the same value as"
      options:
        A: "(99 × 100) + 1"
        B: "(99 × 100)(99 × 1)"
        C: "(99 × 100) - (99 × 1)"
        D: "(99 × 100) + (99 × 1)"
      correct_answer: "D"

    - number: 6
      question: "There are 40 students in a class. Girls make up 60% of the class. 25% of the girls wear glasses. How many girls wear glasses?"
      options:
        A: "6"
        B: "8"
        C: "10"
        D: "15"
      correct_answer: "A"

    - number: 7
      question: "If n(A) = m, then the number of subsets of A can be expressed as"
      options:
        A: "2ᵐ"
        B: "m²"
        C: "2²ᵐ"
        D: "2m²"
      correct_answer: "A"

    - number: 8
      question: "Which statement describes the set of integers greater than -3 but less than 6?"
      options:
        A: "{x: -3 > x > 6, x ∈ Z}"
        B: "{x: -3 ≥ x ≥ 6, x ∈ Z}"
        C: "{x: -3 ≤ x ≤ 6, x ∈ Z}"
        D: "{x: -3 < x < 6, x ∈ Z}"
      correct_answer: "D"

    - number: 9
      question: "Which pair of sets is an example of disjoint sets?"
      options:
        A: "E = even numbers, F = odd numbers"
        B: "P = multiples of 2, Q = multiples of 3"
        C: "G = multiples of five, H = factors of 20"
        D: "X = whole numbers, Y = rational numbers"
      correct_answer: "A"

    - number: 10
      question: "Given A = {1,3,6,8,9,12,15} and B = {6,9,12}, which statement is true?"
      options:
        A: "B ⊂ A"
        B: "A ∩ B = ∅"
        C: "A and B are disjoint sets"
        D: "B is the complement of A"
      correct_answer: "A"

    - number: 11
      question: "30 students have a dog or cat or none. All with a cat also have a dog. n(C)=12, n(D)=16. Which Venn diagram is correct?"
      options:
        A: "Diagram A"
        B: "Diagram B"
        C: "Diagram C"
        D: "Diagram D"
      correct_answer: "A"

    - number: 12
      question: "In which Venn diagram is the region A ∩ B' shaded?"
      options:
        A: "Diagram A"
        B: "Diagram B"
        C: "Diagram C"
        D: "Diagram D"
      correct_answer: "A"

    - number: 13
      question: "If EC $2.50 = US $1.00, then EC $20.00 in US dollars is"
      options:
        A: "$5.00"
        B: "$8.00"
        C: "$50.00"
        D: "$80.00"
      correct_answer: "B"

    - number: 14
      question: "Simple interest on $600 for t years at 5% per annum is $120. The value of t is"
      options:
        A: "(100 × 120)/(600 × 5)"
        B: "(600 × 5)/(100 × 120)"
        C: "(100 × 5 × 120)/600"
        D: "(600 × 5 × 120)/100"
      correct_answer: "A"

    - number: 15
      question: "y varies directly as x and y = 19 when x = 152. Which equation represents the relationship?"
      options:
        A: "y = 8x"
        B: "y = (1/133)x"
        C: "y = (1/8)x"
        D: "y = x - 133"
      correct_answer: "C"

    - number: 16
      question: "Man's annual salary $45,000. Tax free allowances $13,000. Tax = 20% on taxable income. Tax payable?"
      options:
        A: "$2,600"
        B: "$6,400"
        C: "$9,000"
        D: "$11,600"
      correct_answer: "B"

    - number: 17
      question: "Man pays 60 cents per 200 m³ of gas plus fixed charge $13.75. How much for 55,000 m³?"
      options:
        A: "$178.75"
        B: "$175.25"
        C: "$165.00"
        D: "$151.25"
      correct_answer: "A"

    - number: 18
      question: "Car valued at $12,000 depreciates at 10% per annum. Value after one year?"
      options:
        A: "$10,800"
        B: "$11,800"
        C: "$11,880"
        D: "$13,200"
      correct_answer: "A"

    - number: 19
      question: "Dinner advertised at $60 plus 18% tax. Total bill?"
      options:
        A: "$60.00"
        B: "$70.80"
        C: "$78.00"
        D: "$81.60"
      correct_answer: "B"

    - number: 20
      question: "Store offers 10% discount for spending over $20. Customer bill $80. What will he pay?"
      options:
        A: "$60"
        B: "$70"
        C: "$72"
        D: "$74"
      correct_answer: "C"

    - number: 21
      question: "4/(5x) + 2/(5x) ="
      options:
        A: "6/(5x)"
        B: "6/(10x)"
        C: "8/(25x)"
        D: "6/(25x)"
      correct_answer: "A"

    - number: 22
      question: "If m*n = √(m³ - n²), then 5*2 ="
      options:
        A: "2"
        B: "√11"
        C: "√34"
        D: "11"
      correct_answer: "B"

    - number: 23
      question: "Given that 3(x - 1) - 2(x - 1) = 7, the value of x is"
      options:
        A: "6"
        B: "7"
        C: "8"
        D: "9"
      correct_answer: "C"

    - number: 24
      question: "-(-2g) - 3g ="
      options:
        A: "-6g"
        B: "-5g"
        C: "-g"
        D: "5g"
      correct_answer: "C"

    - number: 25
      question: "If x = 4 and y = 2, then (x² + 3y)/(xy) ="
      options:
        A: "1¾"
        B: "2½"
        C: "2¾"
        D: "3"
      correct_answer: "C"

    - number: 26
      question: "If p/5 = 20, then p ="
      options:
        A: "20 - 5"
        B: "20 + 5"
        C: "20 ÷ 5"
        D: "20 × 5"
      correct_answer: "D"

    - number: 27
      question: "The vector p - q is represented by"
      options:
        A: "[1,12]"
        B: "[5,12]"
        C: "[5,2]"
        D: "[1,5]"
      correct_answer: "C"

    - number: 28
      question: "In parallelogram EFGH, EF ∥ HG, EH ∥ FG, EF = k, EH = m. EG expressed in terms of k and m is"
      options:
        A: "k + m"
        B: "k - m"
        C: "m - k"
        D: "-m - k"
      correct_answer: "A"

    - number: 29
      question: "If [x,y] = 4[10,20], then x and y are"
      options:
        A: "x = 4, y = 5"
        B: "x = 8, y = 16"
        C: "x = 2.5, y = 4"
        D: "x = 10, y = 20"
      correct_answer: "B"

    - number: 30
      question: "The matrix product AB is"
      options:
        A: "[[-12,-6],[25,9]]"
        B: "[[-6,-12],[9,25]]"
        C: "[[9,-18],[9,25]]"
        D: "[[9,-12],[9,25]]"
      correct_answer: "A"

    - number: 31
      question: "The volume of a cube whose edge is 6 cm long is"
      options:
        A: "18 cm³"
        B: "36 cm³"
        C: "72 cm³"
        D: "216 cm³"
      correct_answer: "D"

    - number: 32
      question: "If a speedboat took 9 hours to travel 1,080 km, average speed in km/h is"
      options:
        A: "12"
        B: "102"
        C: "120"
        D: "1,200"
