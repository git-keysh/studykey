exam:
  title: "CSEC English A P1 2017 MJ"
  year: 2017
  subject: "English A"
  total_items: 60
  items:
    - number: 1
      question: "We found her appreciative of the help that we had given her on this matter."
      options:
        A: "unhappy about"
        B: "displeased at"
        C: "ungrateful for"
        D: "intolerant of"
      correct_answer: "C"

    - number: 2
      question: "While the employers approved of his work habits, they objected to his radical views."
      options:
        A: "capitalist"
        B: "informed"
        C: "fashionable"
        D: "conservative"
      correct_answer: "D"

    - number: 3
      question: "At the sound of the bell, the lower forms went reluctantly back to their classrooms."
      options:
        A: "willingly"
        B: "hurriedly"
        C: "anxiously"
        D: "punctually"
      correct_answer: "A"

    - number: 4
      question: "The guest speaker's address was devoid of humour and this made persons uneasy."
      options:
        A: "full of"
        B: "indicative of"
        C: "controlled by"
        D: "presented with"
      correct_answer: "A"

    - number: 5
      question: "As a result of the available evidence, the accused was apprehended and no further action was taken."
      options:
        A: "evicted"
        B: "released"
        C: "cautioned"
        D: "summoned"
      correct_answer: "B"

    - number: 6
      question: "Despite his being somewhat short-tempered, his willingness to give of his wealth to help others to succeed led people to call him"
      options:
        A: "hasty"
        B: "foolish"
        C: "benevolent"
        D: "old fashioned"
      correct_answer: "C"

    - number: 7
      question: "When parents display a ______ for one child, the others are likely to feel ______"
      options:
        A: "concern unsympathetic"
        B: "dislike indifferent"
        C: "fondness lonely"
        D: "preference jealous"
      correct_answer: "D"

    - number: 8
      question: "An attack on someone when that person is most vulnerable may be ______ but is always ______"
      options:
        A: "inappropriate thoughtful"
        B: "rewarding satisfying"
        C: "destructive distressing"
        D: "effective unkind"
      correct_answer: "D"

    - number: 9
      question: "While the committee members ______ insults across the floor, the chairman tried in vain to ______ order."
      options:
        A: "hurled restore"
        B: "spoke impose"
        C: "gave maintain"
        D: "exchanged conserve"
      correct_answer: "A"

    - number: 10
      question: "Are you trying to ______ that all along he knew of the plot to oust the committee?"
      options:
        A: "clarify"
        B: "accuse"
        C: "identify"
        D: "insinuate"
      correct_answer: "D"

    - number: 11
      question: "Mary still wanted to marry John even though he had lost all his money."
      options:
        A: "Mary agreed to marry John although he had lost all his money."
        B: "The loss of all John's money did not affect Mary's wish to marry him."
        C: "John's money did not matter to Mary who still wanted to marry him."
        D: "Mary intended to marry John even if he were to lose all his money."
      correct_answer: "B"

    - number: 12
      question: "No right-thinking person who has lived in the country will fail to understand my disgust at noise."
      options:
        A: "Every right-thinking person will understand my disgust at noise in the country."
        B: "Noise in the country is as disgusting to me as it is to all right-thinking people."
        C: "My disgust at noise will be understood by any right-thinking person who has lived in the country."
        D: "It is inconceivable that a right-thinking person in the country could fail to understand my disgust at noise."
      correct_answer: "C"

    - number: 13
      question: "The youth of the country need to organize themselves into co-operatives in order to support the prime minister's drive for self-sufficiency."
      options:
        A: "Co-operatives are the only means by which the prime minister's plan for self-sufficiency could be achieved by the youth."
        B: "The prime minister advised the youth to get into co-operative groups so that they could support his plan for self-sufficiency."
        C: "The youth should show their support for the prime minister's plans for self-sufficiency by organizing themselves into co-operatives."
        D: "In order to support the plan for self-sufficiency the youth need to organize themselves and co-operate with the prime minister."
      correct_answer: "C"

    - number: 14
      question: "Realizing that her suitcase was left on the bus, the woman desperately tried to attract the conductor's attention."
      options:
        A: "When the desperate woman realized that she was leaving the bus without her suitcase, she tried to attract the conductor's attention."
        B: "The woman became aware of the fact that she no longer had her suitcase and did her best to catch the attention of the bus conductor."
        C: "The woman made all attempts to attract the conductor's attention to the suitcase which she had left on the bus."
        D: "The conductor's attention was attracted by the woman who in desperation, had forgotten her suitcase on the bus."
      correct_answer: "B"

    - number: 15
      question: "The Europeans who were not well off were those who came to the West Indies in search of wealth."
      options:
        A: "Europeans settled in the West Indies because they were told that they would become richer."
        B: "Unemployment at home caused Europeans to come to the West Indies to seek their fortune."
        C: "Financial difficulties at home made Europeans who came to the West Indies decide to settle there."
        D: "Europeans who came to the West Indies to seek their fortunes were the ones who were not wealthy."
      correct_answer: "D"

    - number: 16
      question: "We could reach the survivors neither by boat or by plane, and so we abandoned our search as futile."
      options:
        A: "neither"
        B: "or"
        C: "futile"
        D: "No error"
      correct_answer: "B"

    - number: 17
      question: "I formed the brilliant idea of climbing the fence and to hang from the top of the rail until the bull went away."
      options:
        A: "formed"
        B: "to hang"
        C: "went away"
        D: "No error"
      correct_answer: "B"

    - number: 18
      question: "She was not feeling well at the beginning of the journey, and sitting at the front of the car made her feel worse."
      options:
        A: "well"
        B: "beginning"
        C: "worse"
        D: "No error"
      correct_answer: "D"

    - number: 19
      question: "My ambition is to have a good job and to further my studies at one of the more prestigious universities."
      options:
        A: "ambition"
        B: "to further"
        C: "more prestigious"
        D: "No error"
      correct_answer: "D"

    - number: 20
      question: "The better of the two athletes claim never to have used the dangerous drugs found in his possession."
      options:
        A: "better"
        B: "claim"
        C: "dangerous"
        D: "No error"
      correct_answer: "B"

    - number: 21
      question: "Which of the following is NOT true of the poet today?"
      options:
        A: "She cannot smile."
        B: "She cannot be sad today."
        C: "She does not love children."
        D: "She cannot see beauty in anything."
      correct_answer: "B"

    - number: 22
      question: "Which of the following words BEST describes the poet's mood?"
      options:
        A: "Jovial"
        B: "Anxious"
        C: "Reflective"
        D: "Melancholic"
      correct_answer: "D"

    - number: 23
      question: "The word 'particularly' (line 4) is NEAREST in meaning to"
      options:
        A: "rarely"
        B: "truthfully"
        C: "especially"
        D: "sincerely"
      correct_answer: "C"

    - number: 24
