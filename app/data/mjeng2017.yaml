    - number: 26
      question: "The words 'nor see beauty' (line 10) mean that the poet cannot"
      options:
        A: "see nature"
        B: "see her friend"
        C: "tolerate people"
        D: "appreciate anything"
      correct_answer: "D"

    - number: 27
      question: "'I looked down the future today' (line 14) is an example of"
      options:
        A: "simile"
        B: "metaphor"
        C: "onomatopoeia"
        D: "personification"
