exam:
  title: "CSEC Mathematics P1 2023 MJ"
  year: 2023
  subject: "Mathematics"
  total_items: 60
  items:
    - number: 1
      question: "(-3)^2 + (-2)^2 is equal to"
      options:
        A: "-13"
        B: "-10"
        C: "13"
        D: "25"
      correct_answer: "C"

    - number: 2
      question: "What percentage of 40 is 8?"
      options:
        A: "5%"
        B: "20%"
        C: "32%"
        D: "150%"
      correct_answer: "B"

    - number: 3
      question: "When 0.45 is written as a common fraction, in its simplest form, the result is"
      options:
        A: "9/20"
        B: "4/5"
        C: "9/10"
        D: "5/4"
      correct_answer: "A"

    - number: 4
      question: "If 235 × 48.7 = 11444.5, then 2.35 × 4.87 ="
      options:
        A: "11.4445"
        B: "114.445"
        C: "1,144.45"
        D: "11,444.4"
      correct_answer: "A"

    - number: 5
      question: "A test was marked out of 80. A boy scored 60% of the marks on the test. How many marks did he score?"
      options:
        A: "20"
        B: "48"
        C: "60"
        D: "75"
      correct_answer: "B"

    - number: 6
      question: "Dan sold 40 concert tickets in 5 days. Each day he sold 3 tickets MORE than the previous day. What is the ratio of the number of tickets sold on Day 3 to the number of tickets sold on Day 5?"
      options:
        A: "1:7"
        B: "4:7"
        C: "7:4"
        D: "5:11"
      correct_answer: "B"

    - number: 7
      question: "Which of the following sets is defined by {x ∈ Z: -2 ≤ x ≤ 4}?"
      options:
        A: "{1,2,3,4}"
        B: "{0,1,2,3,4}"
        C: "{-1,0,1,2,3}"
        D: "{-2,-1,0,1,2,3,4}"
      correct_answer: "D"

    - number: 8
      question: "The set of positive integers that is divisible by 6 is an example of"
      options:
        A: "a finite set"
        B: "an empty set"
        C: "an infinite set"
        D: "an improper set"
      correct_answer: "C"

    - number: 9
      question: "If n(U) = 25, n(A) = 14, n(B) = 15 and n(A∪B) = 23, then n(A∩B) is"
      options:
        A: "2"
        B: "4"
        C: "6"
        D: "9"
      correct_answer: "C"

    - number: 10
      question: "How many students play BOTH games?"
      options:
        A: "2"
        B: "3"
        C: "4"
        D: "6"
      correct_answer: "C"

    - number: 11
      question: "How many students play EXACTLY one game?"
      options:
        A: "2"
        B: "3"
        C: "4"
        D: "6"
      correct_answer: "B"

    - number: 12
      question: "The 30 students in Teacher May's class have either a dog or a cat or none. Sixteen have a dog, 12 have a cat, remainder have neither. Which Venn diagram correctly represents this?"
      options:
        A: "Diagram A"
        B: "Diagram B"
        C: "Diagram C"
        D: "Diagram D"
      correct_answer: "A"

    - number: 13
      question: "At a bank, EC $2.60 is equivalent to US $1.00. For every US $1.00 exchanged, EC $0.10 is deducted as fee. How much EC will Leon receive for US $1,000.00?"
      options:
        A: "$900.90"
        B: "$2,360.34"
        C: "$2,500.00"
        D: "$2,600.00"
      correct_answer: "C"

    - number: 14
      question: "A dress which costs $1,800.00 is being sold at a discount of 10%. The amount of the discount is"
      options:
        A: "$18.00"
        B: "$100.00"
        C: "$180.00"
        D: "$1,620.00"
      correct_answer: "C"

    - number: 15
      question: "If $7,000 is borrowed at 5% per annum for 3 years, the simple interest would be"
      options:
        A: "$105"
        B: "$210"
        C: "$370"
        D: "$1,050"
      correct_answer: "D"

    - number: 16
      question: "An article bought for $125 was sold for $100. The loss as a percentage of the cost price was"
      options:
        A: "20"
        B: "25"
        C: "75"
        D: "80"
      correct_answer: "A"

    - number: 17
      question: "The cash price of a TV is $350. On hire purchase: $35 deposit + 12 monthly payments of $30. How much is saved by paying cash?"
      options:
        A: "$10"
        B: "$25"
        C: "$40"
        D: "$45"
      correct_answer: "D"

    - number: 18
      question: "If simple interest on $900 at 4% per annum for t years is $108, what is t?"
      options:
        A: "2"
        B: "3"
        C: "4"
        D: "5"
      correct_answer: "B"

    - number: 19
      question: "At year end, a car is worth 5% less than at the beginning. If a car is worth $19,000 in Dec 2021, its value in Jan 2021 was"
      options:
        A: "$19,990"
        B: "$20,000"
        C: "$20,050"
        D: "$24,000"
      correct_answer: "B"

    - number: 20
      question: "A man's regular pay is $8 per hour up to 40 hours. Overtime is double. If he was paid $480, how many overtime hours did he work?"
      options:
        A: "10"
        B: "12"
        C: "20"
        D: "30"
      correct_answer: "A"

    - number: 21
      question: "Seven times the product of two numbers a and b may be written as"
      options:
        A: "7ab"
        B: "49ab"
        C: "7a + b"
        D: "7(a + b)"
      correct_answer: "A"

    - number: 22
      question: "1/(2x) + 1/(3x) is equal to"
      options:
        A: "2/(5x²)"
        B: "5/(6x)"
        C: "5/(6x²)"
        D: "2/(5x)"
      correct_answer: "B"

    - number: 23
      question: "What is the value of (x² + 3y)/(xy) if x = 4 and y = 2?"
      options:
        A: "1¾"
        B: "2½"
        C: "2⅜"
        D: "2¾"
      correct_answer: "D"

    - number: 24
      question: "If 5(2x - 1) = 35, then x ="
      options:
        A: "-4"
        B: "1/4"
        C: "3"
        D: "4"
      correct_answer: "D"

    - number: 25
      question: "John has x marbles and Max has twice as many. Max gives John 5 marbles. How many does John now have?"
      options:
        A: "x + 5"
        B: "2x - 5"
        C: "x + 10"
        D: "2x + 5"
      correct_answer: "A"

    - number: 26
      question: "Given that 3*6 = 12 and 2*5 = 9, then a*b may be defined as"
      options:
        A: "a + b"
        B: "2a + b"
        C: "a + 2b"
        D: "2a + 2b"
      correct_answer: "B"

    - number: 27
      question: "If A = [[1,2,5,4],[6,1,3,7],[-2,3,2,9]], then the order of A is"
      options:
        A: "2×4"
        B: "3×4"
        C: "4×2"
        D: "4×3"
      correct_answer: "B"

    - number: 28
      question: "The determinant of P = [[2,1],[7,4]] is"
      options:
        A: "2"
        B: "-2"
        C: "-13"
        D: "26"
      correct_answer: "A"

    - number: 29
      question: "Given p = [3,7] and q = [-2,5], the vector p - q is represented by"
      options:
        A: "[1,12]"
        B: "[5,12]"
        C: "[5,2]"
        D: "[1,5]"
      correct_answer: "C"

    - number: 30
      question: "In triangle OLM, R midpoint of OL, T midpoint of OM, OR = a, OT = b. RM expressed in terms of a and b is"
      options:
        A: "a + 2b"
        B: "2b - a"
        C: "2(b - a)"
        D: "2(a + b)"
      correct_answer: "B"

    - number: 31
      question: "Given 1 mm = 1/1000 m, then 2,500 mm in metres is"
      options:
        A: "0.25"
        B: "2.5"
        C: "25"
        D: "250"
      correct_answer: "B"

    - number: 32
      question: "The volume of a cube whose edge is 10 cm is"
      options:
        A: "30 cm³"
        B: "100 cm³"
        C: "300 cm³"
        D: "1,000 cm³"
      correct_answer: "D"

    - number: 33
      question: "At a party, 15 litres of champagne was served. Each guest had 2 glasses of 150 mL each. How many guests?"
      options:
        A: "10"
        B: "50"
        C: "75"
        D: "100"
      correct_answer: "B"

    - number: 34
      question: "If the area of trapezium PQRS is 65 cm², then the height h is"
      options:
        A: "2.5 cm"
        B: "3.5 cm"
        C: "4.8 cm"
        D: "5.0 cm"
      correct_answer: "D"

    - number: 35
      question: "The perimeter of a square is 56 cm. What is its area in cm²?"
      options:
        A: "28"
        B: "78"
        C: "169"
        D: "196"
      correct_answer: "D"

    - number: 36
      question: "The distance around a circular pond is 88 metres. The radius in metres is"
      options:
        A: "88π"
        B: "176π"
        C: "88/(2π)"
        D: "88/π"
      correct_answer: "C"

    - number: 37
      question: "Compound shape: triangle of height 4 cm on a square. Area of triangle = 14 cm². Area of compound shape is"
      options:
        A: "30 cm²"
        B: "63 cm²"
        C: "65 cm²"
        D: "95 cm²"
      correct_answer: "B"

    - number: 38
      question: "Pilot's watch: left at 23:00, arrived next day at 03:00. Average speed 625 km/h. Distance covered?"
      options:
        A: "2,500 km"
        B: "10,000 km"
        C: "12,500 km"
        D: "16,250 km"
      correct_answer: "A"

    - number: 39
      question: "Ms Clarke arranged 15 test scores and selected the 8th score. Which statistical measure?"
      options:
        A: "Mean"
        B: "Mode"
        C: "Range"
        D: "Median"
      correct_answer: "D"

    - number: 40
      question: "How many students scored AT MOST 45 marks?"
      options:
        A: "34"
        B: "40"
        C: "166"
        D: "170"
      correct_answer: "D"

    - number: 41
      question: "The median mark scored by the 200 students is"
      options:
        A: "30"
        B: "37"
        C: "48"
        D: "100"
      correct_answer: "B"

    - number: 42
      question: "In a box: 8 red, 7 blue, 6 green marbles. One picked randomly. Probability it is neither blue nor green?"
      options:
        A: "8/21"
        B: "3/7"
        C: "9/22"
        D: "2/3"
      correct_answer: "A"

    - number: 43
      question: "How many students played cricket? (Pie chart, 720 students)"
      options:
        A: "35"
        B: "120"
        C: "252"
        D: "300"
      correct_answer: "C"

    - number: 44
      question: "Probability that a student is a male who travelled by taxi"
      options:
        A: "1/4"
        B: "25/54"
        C: "25/33"
        D: "33/50"
      correct_answer: "A"

    - number: 45
      question: "The point where a linear function crosses the vertical axis is"
      options:
        A: "the y-intercept"
        B: "the x-intercept"
        C: "always positive"
        D: "always negative"
      correct_answer: "A"

    - number: 46
      question: "Equation of line crossing vertical axis at (0,5) with gradient 4 is"
      options:
        A: "y = 4x"
        B: "y = 5x"
        C: "y = 4x + 5"
        D: "y = 5x + 4"
      correct_answer: "C"

    - number: 47
      question: "Which graph represents a linear function?"
      options:
        A: "Graph A"
        B: "Graph B"
        C: "Graph C"
        D: "Graph D"
      correct_answer: "A"

    - number: 48
      question: "The equation of the axis of symmetry for y = 4x - x² is"
      options:
        A: "y = 2"
        B: "y = 4"
        C: "x = 0"
        D: "x = 2"
      correct_answer: "D"

    - number: 49
      question: "Line L is perpendicular to y = (3/7)x - 9. Gradient of L is"
      options:
        A: "-7/3"
        B: "-9/7"
        C: "3/7"
        D: "7/3"
      correct_answer: "A"

    - number: 50
      question: "If g(x) = (7x - 3)/5, then g(-6) ="
      options:
        A: "-9"
        B: "-39/5"
        C: "39/5"
        D: "9"
      correct_answer: "A"

    - number: 51
      question: "Which equation BEST describes the function? (Arrow diagram)"
      options:
        A: "x + y = 3"
        B: "y = x + 3"
        C: "x = y + 3"
        D: "y = 2x + 1"
      correct_answer: "B"

    - number: 52
      question: "Range of f: x → x³ for domain {-2,-1,0,1,2} is"
      options:
        A: "{8,1,0,1,8}"
        B: "{6,3,0,-3,-6}"
        C: "{-6,-3,0,3,6}"
        D: "{-8,-1,0,1,8}"
      correct_answer: "D"

    - number: 53
      question: "What transformation maps PQR onto P'Q'R'?"
      options:
        A: "Rotation"
        B: "Reflection"
        C: "Translation"
        D: "Enlargement"
      correct_answer: "C"

    - number: 54
      question: "In which polygon does sum of interior angles = sum of exterior angles?"
      options:
        A: "Triangle"
        B: "Hexagon"
        C: "Pentagon"
        D: "Quadrilateral"
      correct_answer: "D"

    - number: 55
      question: "What is the image of line y = -x when rotated anticlockwise about O through 90°?"
      options:
        A: "y = 0"
        B: "x = 0"
        C: "y = -x"
        D: "y = x"
      correct_answer: "D"

    - number: 56
      question: "The translation mapping ABC onto A'B'C' is represented by"
      options:
        A: "[-5,3]"
        B: "[-5,-3]"
        C: "[5,-3]"
        D: "[5,3]"
      correct_answer: "C"

    - number: 57
      question: "In triangle ABC, angle BAC = 30°, AB = 40 m. Length AC in metres is"
      options:
        A: "40 sin 60°"
        B: "40 tan 30°"
        C: "40 sin 30°"
        D: "40 cos 60°"
      correct_answer: "B"

    - number: 58
      question: "Scale factor of enlargement mapping ΔABC to ΔA'B'C' with centre O"
      options:
        A: "1/2"
        B: "-1/2"
        C: "2"
        D: "-2"
      correct_answer: "B"

    - number: 59
      question: "A plane flying 045° changes course clockwise to 135°. The angle turned is"
      options:
        A: "45°"
        B: "90°"
        C: "135°"
        D: "270°"
      correct_answer: "B"

    - number: 60
      question: "In isosceles triangle PQR, equal sides form angle P = x°. What is angle Q or R?"
      options:
        A: "60°"
        B: "45°"
        C: "(180 - x°)/2"
        D: "180° - 2x°"
      correct_answer: "C"