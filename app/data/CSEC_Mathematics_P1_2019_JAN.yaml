    - number: 56
      question: "Which diagram shows a reflection in the x-axis?"
      options:
        A: "Diagram A"
        B: "Diagram B"
        C: "Diagram C"
        D: "Diagram D"
      correct_answer: "A"

    - number: 57
      question: "In triangle ABC, angle A = x°, angle B = 2x°. Size of angle C?"
      options:
        A: "(180 - 3x)°"
