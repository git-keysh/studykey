    - number: 58
      question: "The length of MO in centimetres is"
      options:
        A: "3.0"
        B: "3.5"
        C: "6.0"
        D: "10.5"
      correct_answer: "A"

    - number: 59
      question: "Ship sailed 8 km east from A to B, then 6 km north to C. Which diagram BEST represents the path?"
      options:
        A: "Diagram A"
        B: "Diagram B"
        C: "Diagram C"
        D: "Diagram D"
      correct_answer: "A"

    - number: 60
      question: "Under translation [2,-3], the image of (3,-5) is"
      options:
        A: "(0,-3)"
        B: "(1,-2)"
        C: "(5,-8)"
        D: "(6,15)"
      correct_answer: "C"