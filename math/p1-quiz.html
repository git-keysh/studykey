<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="description" content="Study Key - Practice CSEC Mathematics Paper 1 with past papers, instant feedback, PDF previews, and a fun quiz mode.">
    <meta name="theme-color" content="#1a56db">
    <meta property="og:title" content="Study Key - Mathematics P1 Quiz">
    <meta property="og:description" content="CSEC Maths Paper 1 practice with real past papers and interactive features.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <link rel="icon" type="image/x-icon" href="../assets/favicon.ico">
    <link rel="stylesheet" href="webstructure/login.css">
    <title>Study Key - Mathematics P1 Quiz</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; color: #1e293b; line-height:1.5; min-height:100vh; overflow-x:hidden; touch-action: pan-y; }
        :root { --blue: #1a56db; --blue-dark: #1e40af; --green: #22c55e; --red: #ef4444; --bg: #f8fafc; --card: #ffffff; --border: #e2e8f0; --text: #1e293b; --text-light: #64748b; }
        .navbar { background:var(--blue); color:white; padding:0.75rem 1.5rem; display:flex; align-items:center; gap:0.75rem; box-shadow:0 2px 8px rgba(0,0,0,0.1); position:sticky; top:0; z-index:100; }
        .navbar .logo { font-size:1.3rem; font-weight:800; display:flex; align-items:center; gap:0.5rem; }
        .navbar img { width:32px; height:32px; border-radius:8px; }
        .navbar a { color:white; text-decoration:none; font-weight:600; }
        .navbar .right-actions { margin-left:auto; display:flex; gap:0.75rem; align-items:center; }
        .btn-fun-toggle { background:#f59e0b; border:none; color:white; padding:0.4rem 0.9rem; border-radius:2rem; font-weight:600; font-size:0.8rem; cursor:pointer; box-shadow:0 2px 5px rgba(0,0,0,0.2); transition:0.1s; }
        .btn-fun-toggle.active { background:#d97706; box-shadow:inset 0 1px 3px rgba(0,0,0,0.3); }
        .container { max-width:950px; margin:1.5rem auto; padding:0 1.2rem; transition:margin-right 0.3s; }
        .container.shifted { margin-right:420px; }
        .card { background:white; border-radius:1.2rem; padding:1.6rem; margin-bottom:1.5rem; box-shadow:0 2px 8px rgba(0,0,0,0.04); border:1px solid #e2e8f0; }
        h2 { font-size:1.6rem; margin-bottom:0.5rem; }
        .year-checkboxes { display:flex; flex-wrap:wrap; gap:0.6rem; margin:1rem 0; }
        .year-checkboxes label { display:flex; align-items:center; gap:0.3rem; font-size:0.9rem; cursor:pointer; background:#f1f5f9; padding:0.3rem 0.8rem; border-radius:2rem; }
        input[type="number"] { padding:0.6rem 1rem; border:2px solid #e2e8f0; border-radius:0.8rem; font-size:1rem; width:140px; }
        .btn { background:var(--blue); color:white; border:none; padding:0.7rem 1.4rem; border-radius:0.8rem; font-weight:600; cursor:pointer; transition:0.1s; display:inline-flex; align-items:center; gap:0.5rem; }
        .btn-outline { background:transparent; border:2px solid var(--blue); color:var(--blue); }
        .progress-bar { height:5px; background:#e2e8f0; border-radius:3px; margin:1rem 0; }
        .progress-fill { height:100%; background:var(--blue); width:0%; transition:width 0.2s; }
        .question-text { font-size:1.2rem; font-weight:600; margin-bottom:0.5rem; }
        .question-source { font-size:0.8rem; color:#64748b; margin-bottom:1rem; }
        .options { display:flex; flex-direction:column; gap:0.7rem; }
        .option-btn { text-align:left; padding:0.9rem 1rem; background:#f8fafc; border:2px solid #e2e8f0; border-radius:0.8rem; font-size:0.95rem; cursor:pointer; transition:all 0.1s; }
        .option-btn.correct { background:#f0fdf4; border-color:#22c55e; }
        .option-btn.wrong { background:#fef2f2; border-color:#ef4444; }
        .feedback { padding:0.8rem; border-radius:0.7rem; margin:1rem 0; font-weight:600; display:none; }
        .feedback.correct { background:#d1fae5; color:#065f46; display:block; }
        .feedback.wrong { background:#fee2e2; color:#991b1b; display:block; }
        .hidden { display: none; }
        .results-grid { display:flex; gap:1rem; justify-content:space-between; margin:1.5rem 0; }
        .result-stat { background:#f1f5f9; padding:1rem; border-radius:1rem; text-align:center; flex:1; }
        .result-stat .number { font-size:2rem; font-weight:800; color:var(--blue); }
        .history-list { list-style:none; margin-top:0.8rem; }
        .history-list li { padding:0.5rem 0; border-bottom:1px solid #e2e8f0; display:flex; justify-content:space-between; }

        /* FUN MODE GRID */
        .fun-mode-panel { margin:1.2rem 0; }
        .fun-grid { display:grid; grid-template-columns:repeat(2, 1fr); gap:1rem; margin-top:1rem; }
        .fun-card { aspect-ratio:1; border-radius:1.5rem; display:flex; align-items:center; justify-content:center; font-size:2rem; font-weight:800; color:white; text-shadow:0 2px 5px rgba(0,0,0,0.2); cursor:pointer; transition:transform 0.05s linear, box-shadow 0.1s; box-shadow:0 10px 15px -5px rgba(0,0,0,0.2); }
        .fun-card:active { transform:scale(0.97); }
        .color-red { background: linear-gradient(145deg, #ef4444, #dc2626); }
        .color-green { background: linear-gradient(145deg, #22c55e, #16a34a); }
        .color-blue { background: linear-gradient(145deg, #3b82f6, #2563eb); }
        .color-yellow { background: linear-gradient(145deg, #eab308, #ca8a04); }
        .wrong-animation { animation: shake 0.2s ease-in-out 0s 2; background-color:#dc2626 !important; }
        @keyframes shake { 0% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } 100% { transform: translateX(0); } }
        .fun-status { font-size:1rem; font-weight:600; margin-bottom:0.5rem; display:flex; justify-content:space-between; }

        /* PDF DRAWER */
        .pdf-drawer { position:fixed; top:0; right:0; width:420px; height:100vh; background:white; border-left:1px solid #e2e8f0; z-index:200; transform:translateX(100%); transition:transform 0.3s cubic-bezier(0.2,0.9,0.4,1.1); display:flex; flex-direction:column; box-shadow:-4px 0 20px rgba(0,0,0,0.1); }
        .pdf-drawer.open { transform:translateX(0); }
        .pdf-drawer-header { padding:1rem; border-bottom:1px solid #e2e8f0; display:flex; justify-content:space-between; }
        .pdf-drawer-body { flex:1; overflow:auto; background:#f1f5f9; }
        .pdf-drawer-body iframe { width:100%; height:100%; border:none; }
        .pdf-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.3); z-index:150; opacity:0; pointer-events:none; transition:0.2s; }
        .pdf-overlay.show { opacity:1; pointer-events:auto; }
        @media (max-width:900px) { .pdf-drawer { width:100vw; } .container.shifted { margin-right:0; } }

        /* QUICK CALCULATOR - swipe from left */
        .calc-drawer { position:fixed; left:0; top:0; width:360px; height:100vh; background:#ffffff; border-right:1px solid #e2e8f0; z-index:210; transform:translateX(-100%); transition:transform 0.3s cubic-bezier(0.2,0.9,0.4,1.1); display:flex; flex-direction:column; box-shadow:4px 0 20px rgba(0,0,0,0.1); }
        .calc-drawer.open { transform:translateX(0); }
        .calc-header { padding:1rem; background:#0f172a; color:white; display:flex; justify-content:space-between; }
        .calc-display { background:#1e293b; color:#0f0; font-family:monospace; font-size:1.8rem; padding:1rem; text-align:right; word-break:break-all; min-height:80px; }
        .calc-buttons { display:grid; grid-template-columns:repeat(4,1fr); gap:0.8rem; padding:1rem; background:#f8fafc; }
        .calc-btn { background:white; border:none; padding:1rem; font-size:1.2rem; font-weight:600; border-radius:1rem; box-shadow:0 1px 2px rgba(0,0,0,0.1); cursor:pointer; }
        .calc-btn.operator { background:#eef2ff; color:#1e40af; }
        .calc-btn.equal { background:#1a56db; color:white; }
        .calc-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.2); z-index:200; opacity:0; pointer-events:none; transition:0.2s; }
        .calc-overlay.show { opacity:1; pointer-events:auto; }
        @media (max-width:550px) { .calc-drawer { width:90vw; } }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="logo"><img src="../assets/icon.png" alt="logo" onerror="this.style.display='none'"> Study Key</div>
    <a href="../index.html">Home</a>
    <a href="../hub.html">Hub</a>
    <div class="right-actions">
        <button id="fun-mode-toggle" class="btn-fun-toggle">🎮 Fun Mode OFF</button>
        <button id="pdf-toggle-nav" style="background:rgba(255,255,255,0.2); border:none; color:white; padding:0.4rem 0.8rem; border-radius:0.5rem;">📄 PDF</button>
    </div>
</nav>

<div class="container" id="main-container">
    <div id="setup-screen">
        <div class="card"><h2>📐 Mathematics Paper 1 Quiz</h2><p>Select past papers & number of questions.</p>
            <label>📅 Papers:</label><div class="year-checkboxes" id="year-checkboxes"></div>
            <label>🔢 Questions:</label><input type="number" id="question-count" min="5" max="200" value="30" step="5">
            <div style="margin-top:1.5rem"><button class="btn" id="start-btn">🚀 Start Quiz</button></div>
        </div>
        <div class="card"><h3>📜 Recent Attempts</h3><div id="history-container">—</div></div>
    </div>
    <div id="quiz-screen" class="hidden">
        <div class="card"><div style="display:flex; justify-content:space-between;"><span id="question-counter"></span><span id="score-display"></span></div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <div class="question-text" id="question-text"></div><div class="question-source" id="question-source"></div>
        <div class="options" id="options-container"></div><div class="feedback" id="feedback"></div>
        <button class="btn" id="next-btn" style="display:none;">➡ Next</button></div>
        <div id="fun-mode-container" class="hidden"></div>
    </div>
    <div id="results-screen" class="hidden">
        <div class="card"><h2>✅ Quiz Completed</h2><div class="results-grid"><div class="result-stat"><div class="number" id="final-score">0</div><div>Correct</div></div><div class="result-stat"><div class="number" id="final-total">0</div><div>Total</div></div><div class="result-stat"><div class="number" id="final-percent">0%</div><div>Score</div></div></div>
        <div style="display:flex; gap:0.8rem; flex-wrap:wrap;"><button class="btn" id="retry-btn">🔄 Retry</button><button class="btn btn-outline" id="new-quiz-btn">✨ New Quiz</button><a href="../hub.html" class="btn btn-outline">🏠 Hub</a></div></div>
        <div class="card"><h3>📋 Past Attempts</h3><div id="results-history-container"></div></div>
    </div>
</div>

<div class="pdf-overlay" id="pdf-overlay"></div>
<div class="pdf-drawer" id="pdf-drawer"><div class="pdf-drawer-header"><h3 id="pdf-title">Source PDF</h3><button id="close-pdf" style="background:none;border:none;font-size:1.8rem;">&times;</button></div><div class="pdf-drawer-body"><iframe id="pdf-iframe" style="width:100%;height:100%;"></iframe></div></div>

<div class="calc-overlay" id="calc-overlay"></div>
<div class="calc-drawer" id="calc-drawer"><div class="calc-header"><span>🧮 Quick Calculator</span><button id="close-calc" style="background:none;border:none;color:white;font-size:1.5rem;">&times;</button></div><div class="calc-display" id="calc-display">0</div><div class="calc-buttons" id="calc-buttons"></div></div>

<script>
    const PAPERS = [
        { file: 'CSEC_Mathematics_P1_2017_MJ', label: 'May/June 2017', year:2017, session:'May/June', pdf:'CSEC_Mathematics_P1_2017_MJ.pdf', helperKey:'Maths MJ 2017' },
        { file: 'CSEC_Mathematics_P1_2018_JAN', label: 'January 2018', year:2018, session:'January', pdf:'CSEC_Mathematics_P1_2018_JAN.pdf', helperKey:'Maths Jan 2018' },
        { file: 'CSEC_Mathematics_P1_2019_JAN', label: 'January 2019', year:2019, session:'January', pdf:'CSEC_Mathematics_P1_2019_JAN.pdf', helperKey:'Maths Jan 2019' },
        { file: 'CSEC_Mathematics_P1_2019_MJ', label: 'May/June 2019', year:2019, session:'May/June', pdf:'CSEC_Mathematics_P1_2019_MJ.pdf', helperKey:'Maths MJ 2019' },
        { file: 'CSEC_Mathematics_P1_2020_JAN', label: 'January 2020', year:2020, session:'January', pdf:'CSEC_Mathematics_P1_2020_JAN.pdf', helperKey:'Maths Jan 2020' },
        { file: 'CSEC_Mathematics_P1_2021_JAN', label: 'January 2021', year:2021, session:'January', pdf:'CSEC_Mathematics_P1_2021_JAN.pdf', helperKey:'Maths Jan 2021' },
        { file: 'CSEC_Mathematics_P1_2022_MJ', label: 'May/June 2022', year:2022, session:'May/June', pdf:'CSEC_Mathematics_P1_2022_MJ.pdf', helperKey:'Maths MJ 2022' },
        { file: 'CSEC_Mathematics_P1_2023_JAN', label: 'January 2023', year:2023, session:'January', pdf:'CSEC_Mathematics_P1_2023_JAN.pdf', helperKey:'Maths Jan 2023' },
        { file: 'CSEC_Mathematics_P1_2023_MJ', label: 'May/June 2023', year:2023, session:'May/June', pdf:'CSEC_Mathematics_P1_2023_MJ.pdf', helperKey:'Maths MJ 2023' },
        { file: 'CSEC_Mathematics_P1_2024_JAN', label: 'January 2024', year:2024, session:'January', pdf:'CSEC_Mathematics_P1_2024_JAN.pdf', helperKey:'Maths Jan 2024' },
        { file: 'CSEC_Mathematics_P1_2024_MJ', label: 'May/June 2024', year:2024, session:'May/June', pdf:'CSEC_Mathematics_P1_2024_MJ.pdf', helperKey:'Maths MJ 2024' }
    ];
    const YAML_DIR = '../app/data/';
    const PDF_DIR = '../app/pdfs/';
    const HELPER_JSON = '../app/pdfs/mathshelper.json';
    const STORAGE_KEY = 'studykey_maths_p1_quizzes';

    let allPapersData = [], quizQuestions = [], currentIdx = 0, score = 0, userAnswers = [], quizConfig = {};
    let pageMap = {}, funModeActive = false, waitingForAnswer = false, currentQuestionObj = null;
    let pdfDrawerOpen = false, calcDrawerOpen = false;

    const setupScr = document.getElementById('setup-screen'), quizScr = document.getElementById('quiz-screen'), resultsScr = document.getElementById('results-screen');
    const yearContainer = document.getElementById('year-checkboxes'), startBtn = document.getElementById('start-btn'), questionCountInp = document.getElementById('question-count');
    const questionTextDiv = document.getElementById('question-text'), sourceDiv = document.getElementById('question-source'), optionsDiv = document.getElementById('options-container');
    const feedbackEl = document.getElementById('feedback'), nextBtn = document.getElementById('next-btn'), progressFill = document.getElementById('progress-fill');
    const qCounter = document.getElementById('question-counter'), scoreDisplay = document.getElementById('score-display');
    const funContainer = document.getElementById('fun-mode-container'), funToggle = document.getElementById('fun-mode-toggle');
    const pdfDrawer = document.getElementById('pdf-drawer'), pdfOverlay = document.getElementById('pdf-overlay'), pdfIframe = document.getElementById('pdf-iframe'), pdfTitle = document.getElementById('pdf-title');
    const closePdf = document.getElementById('close-pdf'), pdfToggleNav = document.getElementById('pdf-toggle-nav');
    const calcDrawer = document.getElementById('calc-drawer'), calcOverlay = document.getElementById('calc-overlay'), closeCalc = document.getElementById('close-calc'), calcDisplay = document.getElementById('calc-display'), calcButtonsDiv = document.getElementById('calc-buttons');

    async function loadPageMap() { try { const resp = await fetch(HELPER_JSON); if(resp.ok){ const data = await resp.json(); pageMap = {}; for(const [key,val] of Object.entries(data)){ let m={}; val.forEach(v=>{ m[String(v.question)]=v.page; }); pageMap[key]=m; } } } catch(e){} }
    function getPage(paper, qNum) { if(paper && pageMap[paper.helperKey] && pageMap[paper.helperKey][String(qNum)]) return pageMap[paper.helperKey][String(qNum)]; return Math.floor((qNum-1)/5)+2; }
    function updatePdf(paperInfo, qNum){ if(!paperInfo || !paperInfo.pdf){ pdfTitle.innerText='PDF N/A'; pdfIframe.src=''; return; } const page = getPage(paperInfo, qNum); const url = PDF_DIR + paperInfo.pdf + `#page=${page}`; pdfTitle.innerText=`${paperInfo.session} ${paperInfo.year} - p.${page}`; pdfIframe.src=url; }
    function openPdfDrawer(){ pdfDrawerOpen=true; pdfDrawer.classList.add('open'); pdfOverlay.classList.add('show'); document.getElementById('main-container').classList.add('shifted'); }
    function closePdfDrawer(){ pdfDrawerOpen=false; pdfDrawer.classList.remove('open'); pdfOverlay.classList.remove('show'); document.getElementById('main-container').classList.remove('shifted'); }
    pdfToggleNav.onclick=()=>{ if(pdfDrawerOpen) closePdfDrawer(); else openPdfDrawer(); };
    closePdf.onclick=closePdfDrawer; pdfOverlay.onclick=closePdfDrawer;
    
    function initCalculator(){ const btns = [ ['7','8','9','/'], ['4','5','6','*'], ['1','2','3','-'], ['0','C','=','+'], ['%','.','√','AC'] ]; let expr='0'; function updateDisplay(){ calcDisplay.innerText = expr || '0'; } function compute(){ try { let exp = expr.replace(/√/g, 'Math.sqrt').replace(/%/g, '/100'); let result = Function('"use strict";return ('+exp+')')(); expr = String(result); } catch(e){ expr='Error'; } updateDisplay(); } calcButtonsDiv.innerHTML=''; btns.flat().forEach(label=>{ const btn=document.createElement('button'); btn.className='calc-btn'; if(['/','*','-','+','%','√'].includes(label)) btn.classList.add('operator'); if(label==='=') btn.classList.add('equal'); btn.innerText=label; btn.onclick=()=>{ if(label==='C') expr='0'; else if(label==='AC') expr='0'; else if(label==='=') compute(); else { if(expr==='0' && !isNaN(label) && label!=='.') expr=label; else expr+=label; updateDisplay(); } }; calcButtonsDiv.appendChild(btn); }); updateDisplay(); }
    function openCalcDrawer(){ calcDrawerOpen=true; calcDrawer.classList.add('open'); calcOverlay.classList.add('show'); document.body.style.overflow='hidden'; }
    function closeCalcDrawer(){ calcDrawerOpen=false; calcDrawer.classList.remove('open'); calcOverlay.classList.remove('show'); document.body.style.overflow=''; }
    closeCalc.onclick=closeCalcDrawer; calcOverlay.onclick=closeCalcDrawer;
    let touchStartX=0; document.addEventListener('touchstart',(e)=>{ touchStartX=e.touches[0].clientX; },{passive:true});
    document.addEventListener('touchend',(e)=>{ const diff = touchStartX - e.changedTouches[0].clientX; if(Math.abs(diff)>50){ if(diff>0 && !pdfDrawerOpen && !calcDrawerOpen) openPdfDrawer(); else if(diff<-50 && !calcDrawerOpen) openCalcDrawer(); } });
    document.addEventListener('keydown',(e)=>{ if(e.key==='Escape'){ if(calcDrawerOpen) closeCalcDrawer(); if(pdfDrawerOpen) closePdfDrawer(); } });
    
    async function loadPapers(files){ let loaded=[]; for(let file of files){ try{ const resp=await fetch(YAML_DIR+file+'.yaml'); if(!resp.ok) continue; const txt=await resp.text(); const data=jsyaml.load(txt); if(data?.exam?.items){ const paperMeta=PAPERS.find(p=>p.file===file); loaded.push({ file, year:data.exam.year||paperMeta?.year, session:paperMeta?.session||'Exam', items:data.exam.items, paperInfo:paperMeta }); } } catch(e){} } return loaded; }
    function shuffle(arr){ for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }
    
    async function startQuiz(){ const selected=Array.from(document.querySelectorAll('#year-checkboxes input:checked')).map(cb=>cb.value); if(selected.length===0){ alert('Select at least one paper'); return; } let count=parseInt(questionCountInp.value,10); if(isNaN(count)||count<1) count=30; quizConfig={selectedFiles:selected,questionCount:count}; startBtn.disabled=true; startBtn.innerText='Loading...'; allPapersData=await loadPapers(selected); startBtn.disabled=false; startBtn.innerText='Start Quiz'; if(allPapersData.length===0){ alert('No papers loaded'); return; } let allItems=[]; allPapersData.forEach(paper=>{ paper.items.forEach(item=>{ allItems.push({ ...item, paperFile:paper.file, session:paper.session, year:paper.year, originalQuestionNumber:item.number, paperInfo:paper.paperInfo }); }); }); allItems=shuffle(allItems); if(allItems.length<count) count=allItems.length; quizQuestions=allItems.slice(0,count); currentIdx=0; score=0; userAnswers=[]; setupScr.classList.add('hidden'); quizScr.classList.remove('hidden'); resultsScr.classList.add('hidden'); if(funModeActive) { funContainer.classList.remove('hidden'); buildFunModePanel(); } else { funContainer.classList.add('hidden'); } showQuestion(); }
    
    function buildFunModePanel(){ if(!currentQuestionObj) return; const colors=['red','green','blue','yellow']; const letters=['A','B','C','D']; const correctLetter=currentQuestionObj.correct_answer; const optionsMap=currentQuestionObj.options; const answers=letters.map(l=> ({letter:l,text:optionsMap[l]})); funContainer.innerHTML=`<div class="fun-mode-panel"><div class="fun-status"><span>🎉 FUN MODE</span><span>Tap the correct color</span></div><div class="fun-grid">${answers.map(ans=>`<div class="fun-card color-${colors[letters.indexOf(ans.letter)]}" data-letter="${ans.letter}">${ans.letter}</div>`).join('')}</div></div>`; document.querySelectorAll('.fun-card').forEach(card=>{ card.addEventListener('click',(e)=>{ if(waitingForAnswer) return; const chosenLetter=card.dataset.letter; handleFunAnswer(chosenLetter,correctLetter,card); }); }); }
    
    function handleFunAnswer(selected,correct,cardElement){ if(waitingForAnswer) return; waitingForAnswer=true; const isCorrect=(selected===correct); if(isCorrect){ canvasConfetti({particleCount:150,spread:70,origin:{y:0.6},startVelocity:20,colors:['#22c55e','#3b82f6','#eab308']}); document.querySelectorAll('.fun-card').forEach(c=>{ if(c.dataset.letter===correct) c.style.filter='brightness(1.2) drop-shadow(0 0 8px gold)'; }); } else { const allCards=document.querySelectorAll('.fun-card'); allCards.forEach(c=>{ if(c.dataset.letter===selected){ c.classList.add('wrong-animation'); setTimeout(()=>c.classList.remove('wrong-animation'),400); } }); const wrongMsg=document.createElement('div'); wrongMsg.innerText='WRONG'; wrongMsg.style.position='fixed'; wrongMsg.style.top='40%'; wrongMsg.style.left='50%'; wrongMsg.style.transform='translate(-50%,-50%)'; wrongMsg.style.fontSize='3rem'; wrongMsg.style.fontWeight='900'; wrongMsg.style.color='#ef4444'; wrongMsg.style.textShadow='2px 2px 0 black'; wrongMsg.style.zIndex='999'; wrongMsg.style.backgroundColor='rgba(0,0,0,0.7)'; wrongMsg.style.padding='0.5rem 2rem'; wrongMsg.style.borderRadius='2rem'; document.body.appendChild(wrongMsg); setTimeout(()=>wrongMsg.remove(),600); document.querySelectorAll('.fun-card').forEach(c=>{ if(c.dataset.letter===correct){ c.style.transform='scale(1.05)'; c.style.boxShadow='0 0 0 4px white, 0 0 0 8px #22c55e'; } }); } setTimeout(()=>{ if(isCorrect) score++; updateScoreDisplay(currentIdx+1); userAnswers.push({questionNumber:currentQuestionObj.originalQuestionNumber,selected,correct,paperFile:currentQuestionObj.paperFile}); if(currentIdx+1<quizQuestions.length){ currentIdx++; showQuestion(); } else { endQuiz(); } waitingForAnswer=false; },1000); }
    
    function showQuestion(){ if(currentIdx>=quizQuestions.length){ endQuiz(); return; } const q=quizQuestions[currentIdx]; currentQuestionObj=q; const paperInfo=q.paperInfo; questionTextDiv.innerHTML=`<strong>${currentIdx+1}.</strong> ${q.question}`; sourceDiv.innerHTML=`Source: ${q.session} ${q.year}, Q${q.originalQuestionNumber}`; optionsDiv.innerHTML=''; const letters=['A','B','C','D']; letters.forEach(letter=>{ if(q.options && q.options[letter]){ const btn=document.createElement('button'); btn.className='option-btn'; btn.textContent=`${letter}. ${q.options[letter]}`; btn.onclick=()=>{ if(!funModeActive && !waitingForAnswer){ selectAnswerStandard(letter); } }; optionsDiv.appendChild(btn); } }); const progress=(currentIdx/quizQuestions.length)*100; progressFill.style.width=progress+'%'; qCounter.innerText=`Q${currentIdx+1}/${quizQuestions.length}`; updateScoreDisplay(currentIdx); feedbackEl.className='feedback'; feedbackEl.style.display='none'; nextBtn.style.display='none'; waitingForAnswer=false; updatePdf(paperInfo,q.originalQuestionNumber); if(funModeActive){ buildFunModePanel(); } }
    
    function updateScoreDisplay(idx){ scoreDisplay.innerText=`Score: ${score}/${idx}`; }
    function selectAnswerStandard(selected){ if(waitingForAnswer) return; waitingForAnswer=true; const q=quizQuestions[currentIdx]; const correct=q.correct_answer; const isCorrect=(selected===correct); const btns=document.querySelectorAll('.option-btn'); btns.forEach(btn=>{ btn.disabled=true; const letter=btn.textContent.charAt(0); if(letter===correct) btn.classList.add('correct'); if(letter===selected && !isCorrect) btn.classList.add('wrong'); }); feedbackEl.textContent=isCorrect?'✅ Correct!':`❌ Incorrect. Answer: ${correct}.`; feedbackEl.className=`feedback ${isCorrect?'correct':'wrong'}`; feedbackEl.style.display='block'; if(isCorrect) score++; updateScoreDisplay(currentIdx+1); userAnswers.push({questionNumber:q.originalQuestionNumber,selected,correct,paperFile:q.paperFile}); nextBtn.style.display='inline-flex'; waitingForAnswer=false; }
    
    function nextQuestionHandler(){ if(currentIdx+1<quizQuestions.length){ currentIdx++; showQuestion(); } else { endQuiz(); } }
    nextBtn.onclick=nextQuestionHandler;
    
    function endQuiz(){ quizScr.classList.add('hidden'); resultsScr.classList.remove('hidden'); closePdfDrawer(); const total=quizQuestions.length; const percent=Math.round((score/total)*100); document.getElementById('final-score').innerText=score; document.getElementById('final-total').innerText=total; document.getElementById('final-percent').innerText=percent+'%'; saveResult({date:new Date().toISOString(),score,total,percentage:percent,papers:quizConfig.selectedFiles,questionCount:quizConfig.questionCount}); updateHistoryDisplay(); updateResultsHistory(); }
    
    function saveResult(res){ let hist=JSON.parse(localStorage.getItem(STORAGE_KEY))||[]; hist.push(res); localStorage.setItem(STORAGE_KEY,JSON.stringify(hist)); }
    function updateHistoryDisplay(){ const container=document.getElementById('history-container'); const hist=JSON.parse(localStorage.getItem(STORAGE_KEY))||[]; if(hist.length===0){ container.innerHTML='<p>No attempts yet</p>'; return; } const recent=hist.slice(-5).reverse(); container.innerHTML='<ul class="history-list">'+recent.map(h=>`<li><span>${new Date(h.date).toLocaleString()}</span><span>${h.score}/${h.total} (${h.percentage}%)</span></li>`).join('')+'</ul>'; }
    function updateResultsHistory(){ const cont=document.getElementById('results-history-container'); const hist=JSON.parse(localStorage.getItem(STORAGE_KEY))||[]; if(hist.length===0){ cont.innerHTML='<p>—</p>'; return; } cont.innerHTML='<ul class="history-list">'+hist.slice(-5).reverse().map(h=>`<li><span>${new Date(h.date).toLocaleString()}</span><span>${h.score}/${h.total} (${h.percentage}%)</span></li>`).join('')+'</ul>'; }
    
    funToggle.onclick=()=>{ funModeActive=!funModeActive; funToggle.innerText=funModeActive?'🎮 Fun Mode ON':'🎮 Fun Mode OFF'; funToggle.classList.toggle('active',funModeActive); if(!quizScr.classList.contains('hidden') && !setupScr.classList.contains('hidden')===false){ if(funModeActive){ funContainer.classList.remove('hidden'); if(currentQuestionObj) buildFunModePanel(); } else { funContainer.classList.add('hidden'); } } };
    
    function initUI(){ PAPERS.forEach(p=>{ const lbl=document.createElement('label'); lbl.innerHTML=`<input type="checkbox" value="${p.file}" checked> ${p.label}`; yearContainer.appendChild(lbl); }); startBtn.onclick=startQuiz; document.getElementById('retry-btn').onclick=()=>{ resultsScr.classList.add('hidden'); setupScr.classList.remove('hidden'); }; document.getElementById('new-quiz-btn').onclick=()=>{ resultsScr.classList.add('hidden'); setupScr.classList.remove('hidden'); document.querySelectorAll('#year-checkboxes input').forEach(cb=>cb.checked=true); questionCountInp.value=30; }; updateHistoryDisplay(); loadPageMap(); initCalculator(); }
    initUI();
</script>
